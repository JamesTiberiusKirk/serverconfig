services:
  lldap:
    image: lldap/lldap:stable
    container_name: lldap
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/London}
      LLDAP_JWT_SECRET: ${LLDAP_JWT_SECRET}
      LLDAP_KEY_SEED: ${LLDAP_KEY_SEED}
      LLDAP_LDAP_BASE_DN: ${LLDAP_BASE_DN}
      LLDAP_LDAP_USER_DN: admin
      LLDAP_LDAP_USER_EMAIL: ${LLDAP_ADMIN_EMAIL}
      LLDAP_LDAP_USER_PASS: ${LLDAP_ADMIN_PASSWORD}
      LLDAP_HTTP_URL: "https://lldap.${BASE_DOMAIN}"
    volumes:
      - ${STACKR_PROV_POOL_SSD}/lldap/data:/data
    networks:
      - traefik
      - default
    healthcheck:
      test: ["CMD", "/app/lldap", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.lldap.rule=Host(`lldap.${BASE_DOMAIN}`)
      - traefik.http.routers.lldap.entrypoints=websecure
      - traefik.http.routers.lldap.tls.certresolver=le
      - traefik.http.routers.lldap-http.rule=Host(`lldap.${BASE_DOMAIN}`)
      - traefik.http.routers.lldap-http.entrypoints=web
      - traefik.http.routers.lldap-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
      - traefik.http.services.lldap.loadbalancer.server.port=17170

  authelia:
    image: authelia/authelia:4.38
    container_name: authelia
    restart: unless-stopped
    depends_on:
      lldap:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/London}
      X_AUTHELIA_CONFIG_FILTERS: template
      BASE_DOMAIN: ${BASE_DOMAIN}
      LLDAP_BASE_DN: ${LLDAP_BASE_DN}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: ${LLDAP_ADMIN_PASSWORD}
    volumes:
      - ./authelia:/config
      - ${STACKR_PROV_POOL_SSD}/authelia/data:/data
    networks:
      - traefik
      - default
    healthcheck:
      test: ["CMD", "authelia", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.authelia.rule=Host(`auth.${BASE_DOMAIN}`)
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.tls.certresolver=le
      - traefik.http.routers.authelia-http.rule=Host(`auth.${BASE_DOMAIN}`)
      - traefik.http.routers.authelia-http.entrypoints=web
      - traefik.http.routers.authelia-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
      - traefik.http.services.authelia.loadbalancer.server.port=9091

networks:
  traefik:
    external: true
  default:
