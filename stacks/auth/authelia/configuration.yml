theme: dark

server:
  address: tcp://0.0.0.0:9091/

log:
  level: info

totp:
  issuer: '{{ env "BASE_DOMAIN" }}'

authentication_backend:
  password_reset:
    disable: true
  refresh_interval: 5m
  ldap:
    implementation: lldap
    address: ldap://lldap:3890
    timeout: 5s
    start_tls: false
    base_dn: '{{ env "LLDAP_BASE_DN" }}'
    additional_users_dn: ou=people
    users_filter: '(&({username_attribute}={input})(objectClass=person))'
    additional_groups_dn: ou=groups
    groups_filter: '(member={dn})'
    user: 'uid=admin,ou=people,{{ env "LLDAP_BASE_DN" }}'
    # AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD set in compose env

access_control:
  default_policy: deny
  rules:
    - domain: '*.{{ env "BASE_DOMAIN" }}'
      policy: one_factor

session:
  name: authelia_session
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: '{{ env "BASE_DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "BASE_DOMAIN" }}'
      default_redirection_url: 'https://dashy.{{ env "BASE_DOMAIN" }}'

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notifications.txt

identity_providers:
  oidc:
    # hmac_secret comes from AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET env var
    jwks:
      - algorithm: 'RS256'
        use: 'sig'
        key: |
          {{- secret "/data/oidc-private.pem" | nindent 10 }}
    clients:
      - client_id: owncloud
        client_name: OwnCloud
        client_secret: '{{ env "OWNCLOUD_OIDC_CLIENT_SECRET_HASH" }}'
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - 'https://oc.{{ env "BASE_DOMAIN" }}/index.php/apps/openidconnect/redirect'
          - 'https://oc.{{ env "BASE_DOMAIN" }}/apps/openidconnect/redirect'
        scopes:
          - openid
          - offline_access
          - profile
          - email
          - groups
        response_types:
          - code
        grant_types:
          - authorization_code
          - refresh_token
        access_token_signed_response_alg: none
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic

      # ownCloud Desktop uses a fixed native-app client id/secret.
      - client_id: xdXOt13JKxym1B1QcEncf2XDkLAexMBFwiT9j6EfhhHFJhs2KM9jbjTmf8JBXE69
        client_name: OwnCloud Desktop
        client_secret: UBntmLjC2yYCeHwsyj73Uwo9TAaecAetRwMw0xYcvNL9yRdLSUi0hUAHfvCHFeFh
        public: false
        authorization_policy: one_factor
        require_pkce: true
        pkce_challenge_method: S256
        redirect_uris:
          - 'http://127.0.0.1'
          - 'http://localhost'
        scopes:
          - openid
          - offline_access
          - profile
          - email
          - groups
        response_types:
          - code
        grant_types:
          - authorization_code
          - refresh_token
        access_token_signed_response_alg: none
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic

      - client_id: grafana
        client_name: Grafana
        client_secret: '{{ env "GRAFANA_OIDC_CLIENT_SECRET_HASH" }}'
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - 'https://grafana.{{ env "BASE_DOMAIN" }}/login/generic_oauth'
        scopes:
          - openid
          - profile
          - email
          - groups
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic

      - client_id: portainer
        client_name: Portainer
        client_secret: '{{ env "PORTAINER_OIDC_CLIENT_SECRET_HASH" }}'
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - 'https://apps.{{ env "BASE_DOMAIN" }}'
        scopes:
          - openid
          - profile
          - email
          - groups
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic

      # Dashy dashboard. Public client (PKCE) — dashy's OIDC config takes no secret.
      # The `groups` scope is what lets dashy hide admin-only tiles.
      - client_id: dashy
        client_name: Dashy
        public: true
        authorization_policy: one_factor
        require_pkce: true
        pkce_challenge_method: S256
        redirect_uris:
          - 'https://dashy.{{ env "BASE_DOMAIN" }}'
        scopes:
          - openid
          - profile
          - email
          - groups
        response_types:
          - code
        grant_types:
          - authorization_code
        access_token_signed_response_alg: none
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: none

      - client_id: immich
        client_name: Immich
        client_secret: '{{ env "IMMICH_OIDC_CLIENT_SECRET_HASH" }}'
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - 'https://pics.{{ env "BASE_DOMAIN" }}/auth/login'
          - 'https://pics.{{ env "BASE_DOMAIN" }}/user-settings'
          - 'app.immich:///oauth-callback'
        scopes:
          - openid
          - profile
          - email
          - groups
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_basic
