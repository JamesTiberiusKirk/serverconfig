theme: dark

server:
  address: tcp://0.0.0.0:9091/

log:
  level: info

totp:
  issuer: '{{ env "BASE_DOMAIN" }}'

authentication_backend:
  password_reset:
    disable: true
  refresh_interval: 5m
  ldap:
    implementation: lldap
    address: ldap://lldap:3890
    timeout: 5s
    start_tls: false
    base_dn: '{{ env "LLDAP_BASE_DN" }}'
    additional_users_dn: ou=people
    users_filter: '(&({username_attribute}={input})(objectClass=person))'
    additional_groups_dn: ou=groups
    groups_filter: '(member={dn})'
    user: 'uid=admin,ou=people,{{ env "LLDAP_BASE_DN" }}'
    # AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD set in compose env

access_control:
  default_policy: deny
  rules:
    - domain: '*.{{ env "BASE_DOMAIN" }}'
      policy: one_factor

session:
  name: authelia_session
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: '{{ env "BASE_DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "BASE_DOMAIN" }}'
      default_redirection_url: 'https://auth.{{ env "BASE_DOMAIN" }}'

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notifications.txt
