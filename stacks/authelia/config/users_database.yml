# Authelia user database.
#
# Add a user:
#   docker run --rm authelia/authelia:4.38 \
#     authelia crypto hash generate argon2 --password 'YOUR_PASSWORD'
# Paste the resulting hash as the `password:` value below.
#
# `email` is the linking identifier across OIDC clients — make it match the
# existing email on each app's local user account.
#
# Reload: edit this file, then `stackr authelia compose restart`.

users:
