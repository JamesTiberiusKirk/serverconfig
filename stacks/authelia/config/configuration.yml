theme: dark

server:
  address: tcp://0.0.0.0:9091/

log:
  level: info

totp:
  issuer: '{{ env "BASE_DOMAIN" }}'

authentication_backend:
  password_reset:
    disable: true
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2
      argon2:
        variant: argon2id

access_control:
  default_policy: deny
  rules:
    - domain: '*.{{ env "BASE_DOMAIN" }}'
      policy: one_factor

session:
  name: authelia_session
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: '{{ env "BASE_DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "BASE_DOMAIN" }}'
      default_redirection_url: 'https://{{ env "BASE_DOMAIN" }}'

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notifications.txt
